# Nim cross-compilation configuration for Pebble
# These flags enable bare-metal ARM compilation

# Target configuration
--os:any
--cpu:arm
--mm:arc

# Memory management
-d:useMalloc
--noMain

# Compilation mode
--compileOnly
-d:noSignalHandler
--threads:off
-d:danger

# Disable checks for minimal binary size
-d:noSignalHandler

# Nimcache directory
--nimcache:nimcache

# Nebble library should be installed via nimble:
#   nimble install nebble     # For released version
#   nimble develop            # For local development (in nebble/ directory)
